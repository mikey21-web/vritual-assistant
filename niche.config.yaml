# Niche Configuration File
# This is the ONLY file an operator edits to configure a deployment.
# Validated against config.schema.json at boot — invalid configs HARD FAIL.
schema_version: 1
core_engine_version: "1.4.2"

niche:
  key: realestate-acme
  industry: real_estate
  display_name: "Acme Realty"

branding:
  logo_url: "https://example.com/logo.png"
  primary_color: "#0B5B7A"
  labels:
    lead: "Buyer"
    leads: "Buyers"
    contact: "Contact"
    conversion: "Deal"

agent:
  model: claude-haiku-4-5
  tone_examples:
    - "Hi {name}! Thanks for reaching out about {property}. Would you like to schedule a site visit?"
    - "Great news — I found some properties that match your criteria. Let me share them with you."
    - "No pressure at all! When you're ready to explore options, I'm here to help."
  goals:
    - "Book a site visit"
    - "Schedule a consultation call"
    - "Qualify budget and timeline"
    - "Send property recommendations"
  prompts:
    welcome: "You are a friendly real estate assistant for {display_name}. Help buyers find their dream home."
  compliance:
    - "RERA: Include project registration number in all property-specific messages"
    - "DPDP: Require explicit opt-in before sending property updates"

packs:
  - type: custom_fields
    payload:
      fields:
        - key: property_type
          label: Property Type
          type: DROPDOWN
          options: ["Apartment", "Villa", "Plot", "Commercial"]
          required: true
        - key: budget_range
          label: Budget Range
          type: TEXT
          required: true
        - key: bedrooms
          label: Preferred Bedrooms
          type: DROPDOWN
          options: ["1", "2", "3", "4", "4+"]
        - key: location
          label: Preferred Location
          type: TEXT
        - key: move_in_timeline
          label: Move-in Timeline
          type: DROPDOWN
          options: ["Immediate", "1-3 months", "3-6 months", "6+ months"]
        - key: financing_status
          label: Financing Status
          type: DROPDOWN
          options: ["Pre-approved", "In Process", "Not Started", "Cash Buyer"]
        - key: site_visit_interest
          label: Site Visit Interest
          type: BOOLEAN

  - type: pipeline_stages
    payload:
      stages:
        - name: New Inquiry
          order: 0
          color: "#3B82F6"
          isDefault: true
        - name: Contacted
          order: 1
          color: "#8B5CF6"
        - name: Qualified
          order: 2
          color: "#06B6D4"
        - name: Site Visit Scheduled
          order: 3
          color: "#F59E0B"
        - name: Negotiation
          order: 4
          color: "#F97316"
        - name: Deal Closed
          order: 5
          color: "#10B981"
          isEnd: true
        - name: Lost
          order: 6
          color: "#EF4444"
          isEnd: true

  - type: scoring_rules
    payload:
      rules:
        - field: budget_range
          operator: gte
          value: "5000000"
          points: 30
          name: "High Budget"
        - field: move_in_timeline
          operator: equals
          value: "Immediate"
          points: 25
          name: "Urgent Buyer"
        - field: financing_status
          operator: equals
          value: "Pre-approved"
          points: 20
          name: "Pre-approved"
        - field: site_visit_interest
          operator: equals
          value: "true"
          points: 15
          name: "Site Visit Interest"

  - type: routing_rules
    payload:
      rules:
        - name: "High Budget to Senior Agent"
          conditions:
            - field: score
              operator: gte
              value: "50"
          action:
            type: assign_to_agent
            agent_role: MANAGER
        - name: "Urgent to Fast Response"
          conditions:
            - field: move_in_timeline
              operator: equals
              value: "Immediate"
          action:
            type: priority_queue
            priority: high

  - type: message_templates
    payload:
      templates:
        - name: welcome_inquiry
          type: WELCOME
          channel: WHATSAPP
          body: "Hi {{name}}! 👋 Thanks for reaching out to {{business_name}}. I'd love to help you find the perfect property. Could you tell me a bit more about what you're looking for?"
          active: true
        - name: site_visit_invite
          type: FOLLOW_UP
          channel: WHATSAPP
          body: "Hi {{name}}, based on your preferences, I have a few properties that might interest you. Would you like to schedule a site visit this weekend?"
          active: true

  - type: nurture_sequences
    payload:
      sequences:
        - name: New Inquiry Follow-up
          active: true
          steps:
            - type: SEND_WHATSAPP
              displayOrder: 0
              waitSeconds: 0
              templateId: null
              config:
                body: "Hi {{name}}, thanks for your interest! Let me know if you have any questions about properties in {{location}}."
            - type: WAIT
              displayOrder: 1
              waitSeconds: 86400
            - type: CHECK_CONDITION
              displayOrder: 2
              condition:
                field: status
                operator: not_equals
                value: "CONTACTED"
              config:
                onPass:
                  - type: SEND_WHATSAPP
                    body: "Hey {{name}}, just checking in! Found anything interesting yet? I'm here to help with any questions."
                onFail: []

  - type: booking_settings
    payload:
      settings:
        - name: Property Site Visit
          provider: calendar
          config:
            duration: 45
            type: in_person
        - name: Consultation Call
          provider: calendar
          config:
            duration: 15
            type: video

  - type: crm_mappings
    payload:
      mappings:
        - name: Default CRM Sync
          crmType: hubspot
          active: true
          fieldMappings:
            - source: name
              target: first_name
            - source: phone
              target: phone
            - source: email
              target: email
            - source: property_type
              target: custom_property_type
            - source: budget_range
              target: custom_budget

  - type: conversion_goals
    payload:
      goals:
        - name: Site Visit Booked
          destination: APPOINTMENT_BOOKING
        - name: Property Shortlisted
          destination: CRM_QUALIFIED_PUSH
        - name: Quote Requested
          destination: QUOTE_REQUEST
        - name: Deal Closed
          destination: PURCHASE_ONLINE

  - type: dashboard_labels
    payload:
      lead: "Buyer"
      leads: "Buyers"
      conversion: "Deal"
      pipeline: "Buyer Journey"
