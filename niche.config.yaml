schema_version: 1
core_engine_version: "1.4.2"
niche:
  key: event-marketing-agency
  industry: events
  display_name: "EventPro Marketing"
branding:
  logo_url: "https://example.com/eventpro-logo.png"
  primary_color: "#0E9D6E"
  labels: { lead: "Client", leads: "Clients", contact: "Contact", conversion: "Booking" }
agent:
  model: claude-haiku-4-5
  tone_examples:
    - "Hey {name}! Thanks for reaching out, always exciting to hear from someone planning something special. What kind of event are you thinking about?"
    - "That sounds like it's going to be an amazing {event_type}! Before I share ideas, what's your approximate guest count so I can tailor the right options?"
    - "No worries at all, take your time! When you're ready, I've got some really cool packages that might fit exactly what you're looking for."
    - "Oh nice, a {event_type}! We've done quite a few of those. Quick question, do you already have a venue in mind or still exploring?"
    - "Totally get it, budgets are important. We work across a wide range, anywhere from intimate gatherings to large-scale productions. What range feels comfortable for you?"
  goals: ["Book a consultation call", "Send event package details", "Schedule venue visit"]
  compliance:
    - "Include cancellation policy in all booking messages"
    - "DPDP: Require explicit opt-in before sending promotional content"
packs:
  - type: custom_fields
    payload:
      fields:
        - { key: event_type, label: "Event Type", type: DROPDOWN, options: ["Wedding", "Corporate", "Birthday", "Conference", "Exhibition"], required: true }
        - { key: guest_count, label: "Expected Guests", type: NUMBER, required: true }
        - { key: event_date, label: "Event Date", type: DATE }
        - { key: budget, label: "Budget Range", type: DROPDOWN, options: ["Under 1L", "1L-5L", "5L-15L", "15L+"] }
        - { key: venue_preference, label: "Venue Preference", type: DROPDOWN, options: ["Indoor", "Outdoor", "Both", "Not Decided"] }
        - { key: services_needed, label: "Services Needed", type: MULTI_SELECT, options: ["Catering", "Decoration", "Photography", "Music", "Transport"] }
  - type: pipeline_stages
    payload:
      stages:
        - { name: "NEW", order: 0, color: "#7C3AED", isDefault: true }
        - { name: "CONTACTED", order: 1, color: "#F59E0B" }
        - { name: "ENGAGED", order: 2, color: "#3B82F6" }
        - { name: "QUALIFYING", order: 3, color: "#F97316" }
        - { name: "QUALIFIED", order: 4, color: "#06B6D4" }
        - { name: "APPOINTMENT_BOOKED", order: 5, color: "#10B981" }
        - { name: "CONVERTED", order: 6, color: "#8B5CF6", isEnd: true }
        - { name: "LOST", order: 7, color: "#EF4444", isEnd: true }
  - type: scoring_rules
    payload:
      rules:
        - { field: event_date, operator: exists, value: "", points: 30, name: "Has Date" }
        - { field: budget, operator: gte, value: "5L-15L", points: 25, name: "High Budget" }
        - { field: event_type, operator: equals, value: "Wedding", points: 20, name: "Wedding Lead" }
        - { field: guest_count, operator: gte, value: "100", points: 15, name: "Large Event" }
  - type: message_templates
    payload:
      templates:
        - name: welcome_event_inquiry
          type: WELCOME
          channel: TELEGRAM
          body: "Hey {{name}}! Thanks for reaching out to {{business_name}}! We'd love to help make your {{event_type}} event something truly special. Mind if I ask a few quick questions to get a sense of what you're looking for?"
          active: true
        - name: proposal_followup
          type: FOLLOW_UP
          channel: TELEGRAM
          body: "Hi {{name}}, I've put together a customized proposal for your {{event_type}} event. Would you like me to share the details?"
          active: true
  - type: nurture_sequences
    payload:
      sequences:
        - name: New Inquiry Follow-up
          active: true
          steps:
            - { type: SEND_WHATSAPP, displayOrder: 0, waitSeconds: 0, config: { body: "Hi {{name}}! Thanks for your interest. Want me to walk you through some event package options?" } }
            - { type: WAIT, displayOrder: 1, waitSeconds: 86400 }
            - { type: CHECK_CONDITION, displayOrder: 2, condition: { field: status, operator: not_equals, value: "CONTACTED" }, config: { onPass: [{ type: SEND_WHATSAPP, body: "Hey {{name}}, just checking in. Still exploring options for your event? Happy to help whenever you're ready." }], onFail: [] } }
  - type: booking_settings
    payload:
      settings:
        - { name: "Consultation Call", provider: calendar, config: { duration: 30, type: video } }
        - { name: "Venue Visit", provider: calendar, config: { duration: 60, type: in_person } }
  - type: conversion_goals
    payload:
      goals:
        - { name: "Consultation Booked", destination: APPOINTMENT_BOOKING }
        - { name: "Proposal Accepted", destination: QUOTE_REQUEST }
        - { name: "Deposit Paid", destination: PURCHASE_ONLINE }
