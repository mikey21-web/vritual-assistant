services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lead-automation-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-lead_automation}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lead-automation-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lead-automation-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-lead_automation}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SIGNED_URL_SECRET: ${SIGNED_URL_SECRET:?SIGNED_URL_SECRET must be set and must differ from JWT_SECRET}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3001}
      N8N_BACKEND_JWT: ${N8N_BACKEND_JWT:-}
      AGENT_SERVICE_URL: http://agent-service:8000
      AGENT_INBOUND_KEY: ${AGENT_INBOUND_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      AGENT_SERVICE_JWT: ${AGENT_SERVICE_JWT:-}
      JWT_EXPIRATION: 24h
      REDIS_URL: redis://redis:6379
      BACKEND_PORT: 3001
      NODE_ENV: production
      STORAGE_PROVIDER: local
      STORAGE_PATH: /app/uploads
      NICHE_CONFIG_PATH: /app/niche.config.yaml
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL:-admin@localhost}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-}
      INTEGRATIONS_ENC_KEY: ${INTEGRATIONS_ENC_KEY:?INTEGRATIONS_ENC_KEY must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      WEBHOOK_API_KEYS: ${WEBHOOK_API_KEYS:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-deepseek-chat}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
    volumes:
      - uploads:/app/uploads
      - ./niche.config.yaml:/app/niche.config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard-v2
      dockerfile: Dockerfile
      args:
        # Build-time: Vite inlines this into the static bundle. Same-origin /api
        # is routed to the backend by the reverse proxy (Caddy).
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_NICHE_NAME: ${VITE_NICHE_NAME:-realestate}
        VITE_PUBLIC_POSTHOG_KEY: phc_A23CgswLWc4FBpdBcw2bLaW3UafXZwzZudHogP3UQbjS
        VITE_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    container_name: lead-automation-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    container_name: lead-automation-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:?N8N_PASSWORD must be set}
      # Domain-aware: prod sets these in .env (N8N_HOST, N8N_PROTOCOL=https,
      # N8N_WEBHOOK_URL, N8N_PATH, N8N_PROXY_HOPS); defaults keep local Docker usable.
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_PATH: ${N8N_PATH:-/}
      # Trust the reverse proxy (Caddy) so rate-limiting sees real client IPs.
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS:-0}
      N8N_BACKEND_API_URL: http://backend:3001
      # Shared secret the workflows send as `Bearer` to the backend; must match
      # the backend's N8N_BACKEND_JWT (backend compares it with timingSafeEqual).
      N8N_BACKEND_JWT: ${N8N_BACKEND_JWT:-}
    volumes:
      - n8ndata:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows
    depends_on:
      - backend

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: lead-automation-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BACKEND_API_URL: http://backend:3001
      AGENT_SERVICE_JWT: ${AGENT_SERVICE_JWT:?AGENT_SERVICE_JWT must be set}
      AGENT_INBOUND_KEY: ${AGENT_INBOUND_KEY:?AGENT_INBOUND_KEY must be set}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      REDIS_URL: redis://redis:6379
      PORT: 8000
      NICHE_CONFIG_PATH: /app/niche.config.yaml
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-lead_automation}
    volumes:
      - ./niche.config.yaml:/app/niche.config.yaml:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Khoj (Second Brain) ──────────────────────────────────────────
  khoj-db:
    image: docker.io/pgvector/pgvector:pg16
    container_name: lead-automation-khoj-db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      POSTGRES_USER: khoj
      POSTGRES_PASSWORD: ${KHOJ_DB_PASSWORD:-khoj}
      POSTGRES_DB: khoj
    volumes:
      - khoj_db:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khoj"]
      interval: 10s
      timeout: 5s
      retries: 5

  khoj-search:
    image: docker.io/searxng/searxng:latest
    container_name: lead-automation-khoj-search
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    volumes:
      - khoj_search:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:42112/

  khoj-server:
    image: ghcr.io/khoj-ai/khoj:latest
    container_name: lead-automation-khoj-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    ports:
      - "42111:42110"
    depends_on:
      khoj-db:
        condition: service_healthy
    working_dir: /app
    volumes:
      - khoj_config:/root/.khoj/
      - khoj_models:/root/.cache/torch/sentence_transformers
      - khoj_models:/root/.cache/huggingface
    environment:
      - POSTGRES_DB=khoj
      - POSTGRES_USER=khoj
      - POSTGRES_PASSWORD=${KHOJ_DB_PASSWORD:-khoj}
      - POSTGRES_HOST=khoj-db
      - POSTGRES_PORT=5432
      - KHOJ_DJANGO_SECRET_KEY=${KHOJ_DJANGO_SECRET_KEY:-khoj-local-dev-key}
      - KHOJ_DEBUG=${KHOJ_DEBUG:-True}
      - KHOJ_ADMIN_EMAIL=${KHOJ_ADMIN_EMAIL:-admin@localhost}
      - KHOJ_ADMIN_PASSWORD=${KHOJ_ADMIN_PASSWORD:-admin}
      - KHOJ_SEARXNG_URL=http://khoj-search:8080
      - OPENAI_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_BASE_URL=https://api.deepseek.com/v1
      - KHOJ_DEFAULT_CHAT_MODEL=deepseek-chat
      - KHOJ_TELEMETRY_DISABLE=True
    command: --host="0.0.0.0" --port=42110 -vv --anonymous-mode --non-interactive

  # ── Daily Database Backup ──────────────────────────────────────
  db-backup:
    image: postgres:16-alpine
    container_name: lead-automation-db-backup
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-lead_automation}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      BACKUP_DIR: /backups
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
    volumes:
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
      - ./backups:/backups
    entrypoint: >
      sh -c "
        if [ -n \"$$R2_ENDPOINT\" ]; then
          apk add --no-cache rclone >/dev/null 2>&1 || true
        fi &&
        echo '0 2 * * * /usr/local/bin/backup-db.sh' > /etc/crontabs/root &&
        echo 'Backup scheduler ready — daily at 2am.' &&
        crond -f -L /dev/stdout
      "
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  uploads:
  n8ndata:
  khoj_db:
  khoj_config:
  khoj_models:
  khoj_search:
