apiVersion: apps/v1
kind: Deployment
metadata:
  name: leadauto-backend
  labels: { app: leadauto, component: backend }
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: leadauto, component: backend }
  template:
    metadata:
      labels: { app: leadauto, component: backend }
    spec:
      containers:
      - name: backend
        image: ghcr.io/mikey21-web/core-backend:latest
        ports: [{ containerPort: 3001 }]
        env:
        - name: NODE_ENV; value: "production"
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: leadauto-secrets, key: database-url } }
        - name: REDIS_URL
          valueFrom: { secretKeyRef: { name: leadauto-secrets, key: redis-url } }
        - name: JWT_SECRET
          valueFrom: { secretKeyRef: { name: leadauto-secrets, key: jwt-secret } }
        livenessProbe:
          httpGet: { path: /health/live, port: 3001 }
          initialDelaySeconds: 30; periodSeconds: 15
        readinessProbe:
          httpGet: { path: /health/ready, port: 3001 }
          initialDelaySeconds: 10; periodSeconds: 10
        resources:
          requests: { memory: "256Mi", cpu: "250m" }
          limits: { memory: "512Mi", cpu: "500m" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leadauto-dashboard
  labels: { app: leadauto, component: dashboard }
spec:
  replicas: 2
  strategy: { type: RollingUpdate }
  selector:
    matchLabels: { app: leadauto, component: dashboard }
  template:
    metadata:
      labels: { app: leadauto, component: dashboard }
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/mikey21-web/core-dashboard:latest
        ports: [{ containerPort: 3000 }]
        resources:
          requests: { memory: "128Mi", cpu: "100m" }
          limits: { memory: "256Mi", cpu: "200m" }
---
apiVersion: v1
kind: Service
metadata: { name: leadauto-backend }
spec:
  selector: { app: leadauto, component: backend }
  ports: [{ port: 3001, targetPort: 3001 }]
---
apiVersion: v1
kind: Service
metadata: { name: leadauto-dashboard }
spec:
  selector: { app: leadauto, component: dashboard }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leadauto-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
  - host: app.example.com
    http:
      paths:
      - path: /api; pathType: Prefix
        backend: { service: { name: leadauto-backend, port: { number: 3001 } } }
      - path: /; pathType: Prefix
        backend: { service: { name: leadauto-dashboard, port: { number: 3000 } } }
  tls:
  - hosts: [app.example.com]
    secretName: leadauto-tls
