services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: lead_automation
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    ports:
      - "127.0.0.1:${BACKEND_PORT}:3001"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/lead_automation
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SIGNED_URL_SECRET: ${SIGNED_URL_SECRET:?SIGNED_URL_SECRET must be set}
      AGENT_INBOUND_KEY: ${AGENT_INBOUND_KEY:?AGENT_INBOUND_KEY must be set}
      AGENT_SERVICE_JWT: ${AGENT_SERVICE_JWT:?AGENT_SERVICE_JWT must be set}
      JWT_EXPIRATION: 24h
      REDIS_URL: redis://redis:6379
      BACKEND_PORT: 3001
      NODE_ENV: production
      STORAGE_PROVIDER: local
      STORAGE_PATH: /app/uploads
      NICHE_CONFIG_PATH: /app/niche.config.yaml
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL:?SEED_OWNER_EMAIL must be set}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:?SEED_OWNER_PASSWORD must be set}
      INTEGRATIONS_ENC_KEY: ${INTEGRATIONS_ENC_KEY:?INTEGRATIONS_ENC_KEY must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
    volumes:
      - uploads:/app/uploads
      - ${NICHE_CONFIG_FILE}:/app/niche.config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard-v2
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DASHBOARD_PORT}:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
