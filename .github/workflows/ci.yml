name: CI/CD

on:
  push:
    branches: [master, main, develop, single-tenant-arch]
  pull_request:
    branches: [master, main, single-tenant-arch]

jobs:
  validate-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: cd backend && npm ci
      - run: npx ts-node --transpile-only scripts/validate-niche.ts --file niche.config.yaml
      - name: Verify validation fails on broken config
        run: |
          printf 'schema_version: 1\ninvalid_field: true\n' > /tmp/broken.yaml
          npx ts-node --transpile-only scripts/validate-niche.ts --file /tmp/broken.yaml && exit 1 || echo "PASS: broken config correctly rejected"

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: lead_automation }
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: cd backend && npm ci
      - run: cd backend && npm audit --audit-level=high
      - run: cd backend && npx prisma generate
      - run: cd backend && npx prisma migrate deploy
      - run: cd backend && npm run build
      - run: cd backend && npm test -- --runInBand --forceExit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lead_automation
          JWT_SECRET: ci-test-secret
          SIGNED_URL_SECRET: ci-test-signed-url-secret
          REDIS_URL: redis://localhost:6379

  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: dashboard-v2/package-lock.json }
      - run: cd dashboard-v2 && npm ci
      - run: cd dashboard-v2 && npx tsc --noEmit
      - run: cd dashboard-v2 && npm run build
