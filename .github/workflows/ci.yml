name: CI/CD

on:
  push:
    branches: [master, main, develop, single-tenant-arch]
  pull_request:
    branches: [master, main, single-tenant-arch]

jobs:
  validate-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: cd backend && npm ci
      - run: cd backend && npx ts-node --transpile-only ../scripts/validate-niche.ts --file ../niche.config.yaml
      - name: Verify validation fails on broken config
        run: |
          printf 'schema_version: 1\ninvalid_field: true\n' > /tmp/broken.yaml
          cd backend && npx ts-node --transpile-only ../scripts/validate-niche.ts --file /tmp/broken.yaml && exit 1 || echo "PASS: broken config correctly rejected"

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: lead_automation }
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: cd backend && npm ci
      - run: cd backend && npm audit --audit-level=high
      - run: cd backend && npx prisma generate
      - run: cd backend && npx prisma migrate deploy
      - run: cd backend && npm run build
      - run: cd backend && npm test -- --runInBand --forceExit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lead_automation
          JWT_SECRET: ci-test-secret
          SIGNED_URL_SECRET: ci-test-signed-url-secret
          REDIS_URL: redis://localhost:6379

  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: dashboard-v2/package-lock.json }
      - run: cd dashboard-v2 && npm ci
      - run: cd dashboard-v2 && npx tsc --noEmit
      - run: cd dashboard-v2 && npm run build

  agent-service:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: 'latest' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: cd agent-service && uv sync --extra dev
      - run: cd agent-service && uv run ruff check .
      - run: cd agent-service && uv run pytest -q
        env:
          ANTHROPIC_API_KEY: ci-test-key
          AGENT_SERVICE_JWT: ci-test-jwt
          AGENT_INBOUND_KEY: ci-test-inbound-key
          BACKEND_API_URL: http://localhost:3001
          REDIS_URL: redis://localhost:6379

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, dashboard]
    env:
      POSTGRES_PASSWORD: ci-test-password
      JWT_SECRET: ci-test-secret
      SIGNED_URL_SECRET: ci-test-signed-url-secret
      N8N_PASSWORD: ci-test-n8n-password
      AGENT_SERVICE_JWT: ci-test-agent-jwt
      AGENT_INBOUND_KEY: ci-test-inbound-key
      ANTHROPIC_API_KEY: ci-test-anthropic-key
      SEED_OWNER_EMAIL: admin@example.com
      SEED_OWNER_PASSWORD: password123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: docker compose -f docker-compose.yml up -d postgres redis backend dashboard
      - name: Wait for backend and dashboard to be ready
        run: npx wait-on http://localhost:3001/health/live http://localhost:3000 -t 90000
      - name: Seed database from the runner (image has no devDependencies for ts-node)
        run: cd backend && npm ci && npx prisma generate && npx prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:ci-test-password@localhost:5433/lead_automation
      - run: cd e2e && npm ci
      - run: cd e2e && npx playwright install --with-deps chromium
      - run: cd e2e && npx playwright test
      - if: always()
        run: docker compose -f docker-compose.yml logs
      - if: always()
        run: docker compose -f docker-compose.yml down -v

  coverage:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: cd backend && npm ci
      - run: cd backend && npm run test:cov
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lead_automation
          JWT_SECRET: ci-test-secret
      - name: Check coverage thresholds
        run: |
          COVERAGE=$(cat backend/coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "::error::Coverage $COVERAGE% is below 50% threshold"
            exit 1
          fi

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config
      - run: docker compose -f docker-compose.yml build backend
      - name: Verify backend image builds and has expected binaries
        run: |
          docker run --rm $(docker compose -f docker-compose.yml build -q backend) ls /app/dist/main.js

  chaos-test:
    runs-on: ubuntu-latest
    needs: backend
    if: github.event.label == 'chaos-test'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd backend && npm ci
      - name: Verify graceful degradation when Redis is killed
        run: |
          docker compose up -d postgres redis
          cd backend && npm run start &
          sleep 30
          curl -s http://localhost:3001/health/live || echo "liveness OK"
          docker compose kill redis
          sleep 5
          curl -s -o /dev/null -w "%{http_code}\n" http://localhost:3001/health/ready || echo "ready degraded"
          curl -s -X POST http://localhost:3001/health/drain || true
