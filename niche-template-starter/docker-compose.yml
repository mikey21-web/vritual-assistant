version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lead_automation
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-your-org}/core-backend:${CORE_ENGINE_VERSION}
    depends_on: [postgres, redis]
    ports: ["3001:3001"]
    volumes: [./niche.config.yaml:/app/niche.config.yaml:ro]
    env_file: .env
    environment:
      NICHE_CONFIG_PATH: /app/niche.config.yaml
    healthcheck:
      test: curl -f http://localhost:3001/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

  agent:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-your-org}/core-agent:${CORE_ENGINE_VERSION}
    depends_on: [backend, redis]
    ports: ["8000:8000"]
    volumes: [./niche.config.yaml:/app/niche.config.yaml:ro]
    env_file: .env
    environment:
      NICHE_CONFIG_PATH: /app/niche.config.yaml

  dashboard:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-your-org}/core-dashboard:${CORE_ENGINE_VERSION}
    depends_on: [backend]
    ports: ["3000:80"]

volumes:
  pgdata:
