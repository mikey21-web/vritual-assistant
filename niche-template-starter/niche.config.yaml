schema_version: 1
core_engine_version: "1.0.0"
niche:
  key: your-niche-key
  industry: real_estate
  display_name: "Your Niche Name"
branding:
  logo_url: ""
  primary_color: "#0B5"
  labels:
    lead: "Lead"
    leads: "Leads"
agent:
  model: claude-haiku-4-5
  tone_examples:
    - "Hi {name}! I noticed you were interested in our services."
  goals:
    - "Book a consultation"
    - "Schedule a call"
  compliance:
    - "DPDP: require explicit opt-in before messaging"
packs:
  - type: custom_fields
    payload:
      fields:
        - key: preferred_contact_time
          label: Preferred Contact Time
          type: text
          section: contact
  - type: pipeline_stages
    payload:
      stages:
        - key: new
          label: New Lead
          color: "#3B82F6"
          order: 1
        - key: contacted
          label: Contacted
          color: "#F59E0B"
          order: 2
        - key: qualified
          label: Qualified
          color: "#10B981"
          order: 3
        - key: converted
          label: Converted
          color: "#059669"
          order: 4
        - key: lost
          label: Lost
          color: "#EF4444"
          order: 5
  - type: scoring_rules
    payload:
      rules:
        - field: source
          operator: equals
          value: FORM
          points: 10
  - type: message_templates
    payload:
      templates:
        - key: welcome
          name: Welcome Message
          channel: WHATSAPP
          text: "Hi {name}! Thanks for reaching out. How can I help you today?"
  - type: compliance
    payload:
      dpdp_compliant: true
      data_retention_days: 365
      ai_disclosure_enabled: true
