name: Deploy

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Validate niche config
        run: |
          docker run --rm -v ${{ github.workspace }}/niche.config.yaml:/validate.yaml \
            ghcr.io/${{ github.repository_owner }}/core-backend:${CORE_ENGINE_VERSION} \
            npx ts-node scripts/validate-niche.ts --file /validate.yaml

  deploy:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy stack
        run: |
          echo "Deploying with CORE_ENGINE_VERSION=${{ vars.CORE_ENGINE_VERSION }}"
          echo "See niche-template-starter/README.md for deployment options."
