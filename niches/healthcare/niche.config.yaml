schema_version: 1
core_engine_version: "1.4.2"
niche:
  key: healthcare-demo
  industry: healthcare
  display_name: "CarePlus Clinic"
branding:
  logo_url: "https://example.com/careplus-logo.png"
  primary_color: "#2563EB"
  labels: { lead: "Patient Inquiry", leads: "Patient Inquiries", contact: "Patient", conversion: "Appointment" }
agent:
  model: claude-haiku-4-5
  tone_examples:
    - "Hi {name}! Thanks for reaching out to {business_name}. Which department or doctor would you like to see?"
    - "I can help you book an appointment. What date and time works best for you?"
  goals: ["Confirm department/doctor preference", "Book an appointment slot", "Share required documents/insurance info"]
  compliance:
    - "AI must NEVER provide medical diagnosis, treatment advice, or symptom interpretation — only assist with scheduling and logistics; escalate any clinical question to a human staff member immediately"
    - "Health-related data is sensitive personal data under DPDP — require explicit opt-in and never store symptom details as message-history plaintext without clinic consent policy"
    - "Include appointment cancellation/rescheduling policy in all confirmations"
packs:
  - type: custom_fields
    payload:
      fields:
        - { key: department, label: "Department", type: DROPDOWN, options: ["General Medicine", "Dental", "Pediatrics", "Dermatology", "Orthopedics", "Cardiology"], required: true }
        - { key: preferred_doctor, label: "Preferred Doctor", type: TEXT }
        - { key: appointment_type, label: "Appointment Type", type: DROPDOWN, options: ["New Patient", "Follow-up", "Consultation", "Procedure"], required: true }
        - { key: preferred_date, label: "Preferred Date", type: DATE }
        - { key: insurance_provider, label: "Insurance Provider", type: TEXT }
        - { key: referred_by, label: "Referred By", type: TEXT }
  - type: pipeline_stages
    payload:
      stages:
        - { name: "New Inquiry", status: NEW, order: 0, color: "#2563EB", isDefault: true }
        - { name: "Contacted", status: CONTACTED, order: 1, color: "#F59E0B" }
        - { name: "Appointment Scheduled", status: APPOINTMENT_BOOKED, order: 2, color: "#06B6D4" }
        - { name: "Consulted", status: ENGAGED, order: 3, color: "#8B5CF6" }
        - { name: "Treatment In Progress", status: QUALIFYING, order: 4, color: "#F97316" }
        - { name: "Follow-up Scheduled", status: QUALIFIED, order: 5, color: "#3B82F6" }
        - { name: "Completed", status: CONVERTED, order: 6, color: "#10B981", isEnd: true }
        - { name: "No-Show / Cancelled", status: LOST, order: 7, color: "#EF4444", isEnd: true }
  - type: scoring_rules
    payload:
      rules:
        - { field: appointment_type, operator: equals, value: "New Patient", points: 20, name: "New Patient" }
        - { field: preferred_date, operator: exists, value: "", points: 25, name: "Has Preferred Date" }
        - { field: referred_by, operator: exists, value: "", points: 15, name: "Referral" }
        - { field: insurance_provider, operator: exists, value: "", points: 10, name: "Has Insurance" }
  - type: message_templates
    payload:
      templates:
        - name: welcome_patient_inquiry
          type: WELCOME
          channel: WHATSAPP
          body: "Hi {{name}}! Thank you for contacting {{business_name}}. Which department would you like to visit, and do you have a preferred date?"
          active: true
        - name: appointment_confirmation
          type: FOLLOW_UP
          channel: WHATSAPP
          body: "Hi {{name}}, your appointment with {{department}} is confirmed for {{preferred_date}}. Please arrive 15 minutes early with any prior reports."
          active: true
