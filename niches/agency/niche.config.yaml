schema_version: 1
core_engine_version: "1.4.2"
niche:
  key: agency-demo
  industry: marketing_agency
  display_name: "GrowthEdge Marketing"
branding:
  primary_color: "#DB2777"
  labels: { lead: "Prospect", leads: "Prospects", contact: "Client", conversion: "Signed Client" }
agent:
  model: claude-haiku-4-5
  tone_examples:
    - "Hi {name}, thanks for reaching out to {business_name}. What are you looking to grow: leads, sales, or brand awareness?"
    - "We'd love to run a free audit on your current marketing. Want me to set that up?"
  goals: ["Understand current marketing spend/channels", "Book a discovery call", "Send a proposal"]
  compliance:
    - "Do not make guaranteed ROI/results claims in automated messages. Only human account managers may quote performance guarantees"
    - "DPDP: Require explicit opt-in before sending promotional/marketing content"
packs:
  - type: custom_fields
    payload:
      fields:
        - { key: service_needed, label: "Service Needed", type: MULTI_SELECT, options: ["SEO", "Paid Ads", "Social Media", "Web Design", "Branding", "Content Marketing"], required: true }
        - { key: current_marketing_spend, label: "Current Monthly Marketing Spend", type: DROPDOWN, options: ["None", "Under 50k", "50k-2L", "2L-10L", "10L+"] }
        - { key: industry_vertical, label: "Client's Industry", type: TEXT }
        - { key: website_url, label: "Website URL", type: TEXT }
        - { key: timeline, label: "Desired Start Timeline", type: DROPDOWN, options: ["Immediate", "This Month", "Next Quarter", "Just Exploring"] }
  - type: pipeline_stages
    payload:
      stages:
        - { name: "New Lead", status: NEW, order: 0, color: "#DB2777", isDefault: true }
        - { name: "Discovery Call Booked", status: APPOINTMENT_BOOKED, order: 1, color: "#F59E0B" }
        - { name: "Audit Sent", status: CONTACTED, order: 2, color: "#3B82F6" }
        - { name: "Proposal Sent", status: PROPOSAL_SENT, order: 3, color: "#06B6D4" }
        - { name: "Negotiation", status: QUALIFYING, order: 4, color: "#F97316" }
        - { name: "Onboarded", status: CONVERTED, order: 5, color: "#10B981", isEnd: true }
        - { name: "Lost", status: LOST, order: 6, color: "#EF4444", isEnd: true }
  - type: scoring_rules
    payload:
      rules:
        - { field: current_marketing_spend, operator: gte, value: "2L-10L", points: 30, name: "High Spend" }
        - { field: timeline, operator: equals, value: "Immediate", points: 25, name: "Urgent" }
        - { field: service_needed, operator: exists, value: "", points: 15, name: "Clear Need" }
        - { field: website_url, operator: exists, value: "", points: 10, name: "Has Website" }
  - type: message_templates
    payload:
      templates:
        - name: welcome_agency_inquiry
          type: WELCOME
          channel: WHATSAPP
          body: "Hi {{name}}, thanks for reaching out to {{business_name}}. What's your main goal right now: more leads, more sales, or stronger brand presence?"
          active: true
        - name: proposal_followup
          type: FOLLOW_UP
          channel: WHATSAPP
          body: "Hi {{name}}, following up on the proposal we sent for {{service_needed}}. Any questions before we get started?"
          active: true
