schema_version: 1
core_engine_version: "1.4.2"
niche:
  key: realestate-acme
  industry: real_estate
  display_name: "Acme Realty"
branding:
  primary_color: "#0B5B7A"
  labels: { lead: "Buyer", leads: "Buyers", contact: "Contact", conversion: "Deal" }
agent:
  model: claude-haiku-4-5
  tone_examples:
    - "Hi {name}! Thanks for reaching out about {property}. Would you like to schedule a site visit?"
    - "No pressure at all! When you're ready to explore options, I'm here to help."
  goals: ["Book a site visit", "Schedule a consultation call", "Send property recommendations"]
  compliance:
    - "RERA: Include project registration number in all property-specific messages"
    - "DPDP: Require explicit opt-in before sending property updates"
packs:
  - type: custom_fields
    payload:
      fields:
        - { key: property_type, label: "Property Type", type: DROPDOWN, options: ["Apartment", "Villa", "Plot", "Commercial"], required: true }
        - { key: budget_range, label: "Budget Range", type: TEXT, required: true }
        - { key: bedrooms, label: "Preferred Bedrooms", type: DROPDOWN, options: ["1", "2", "3", "4", "4+"] }
        - { key: location, label: "Preferred Location", type: TEXT }
        - { key: move_in_timeline, label: "Move-in Timeline", type: DROPDOWN, options: ["Immediate", "1-3 months", "3-6 months", "6+ months"] }
        - { key: financing_status, label: "Financing Status", type: DROPDOWN, options: ["Pre-approved", "In Process", "Not Started", "Cash Buyer"] }
  - type: pipeline_stages
    payload:
      stages:
        - { name: "New Inquiry", status: NEW, order: 0, color: "#3B82F6", isDefault: true }
        - { name: "Contacted", status: CONTACTED, order: 1, color: "#8B5CF6" }
        - { name: "Qualified", status: QUALIFIED, order: 2, color: "#06B6D4" }
        - { name: "Site Visit Scheduled", status: APPOINTMENT_BOOKED, order: 3, color: "#F59E0B" }
        - { name: "Negotiation", status: PROPOSAL_SENT, order: 4, color: "#F97316" }
        - { name: "Deal Closed", status: CONVERTED, order: 5, color: "#10B981", isEnd: true }
        - { name: "Lost", status: LOST, order: 6, color: "#EF4444", isEnd: true }
  - type: scoring_rules
    payload:
      rules:
        - { field: budget_range, operator: gte, value: "5000000", points: 30, name: "High Budget" }
        - { field: move_in_timeline, operator: equals, value: "Immediate", points: 25, name: "Urgent Buyer" }
        - { field: financing_status, operator: equals, value: "Pre-approved", points: 20, name: "Pre-approved" }
        - { field: site_visit_interest, operator: equals, value: "true", points: 15, name: "Site Visit Interest" }
  - type: routing_rules
    payload:
      rules:
        - name: "High Budget to Senior Agent"
          conditions: [{ field: score, operator: gte, value: "50" }]
          action: { type: assign_to_agent, agent_role: MANAGER }
        - name: "Urgent to Fast Response"
          conditions: [{ field: move_in_timeline, operator: equals, value: "Immediate" }]
          action: { type: priority_queue, priority: high }
  - type: message_templates
    payload:
      templates:
        - name: welcome_inquiry
          type: WELCOME
          channel: WHATSAPP
          body: "Hi {{name}}, thanks for reaching out to {{business_name}}. I'd love to help you find the perfect property."
          active: true
        - name: site_visit_invite
          type: FOLLOW_UP
          channel: WHATSAPP
          body: "Hi {{name}}, based on your preferences, I have a few properties that might interest you. Would you like to schedule a site visit this weekend?"
          active: true
  - type: booking_settings
    payload:
      settings:
        - { name: "Property Site Visit", provider: calendar, config: { duration: 45, type: in_person } }
        - { name: "Consultation Call", provider: calendar, config: { duration: 15, type: video } }
  - type: conversion_goals
    payload:
      goals:
        - { name: "Site Visit Booked", destination: APPOINTMENT_BOOKING }
        - { name: "Quote Requested", destination: QUOTE_REQUEST }
        - { name: "Deal Closed", destination: PURCHASE_ONLINE }
