schema_version: 1
core_engine_version: "1.4.2"
niche:
  key: logistics-demo
  industry: logistics
  display_name: "SwiftFreight Logistics"
branding:
  logo_url: "https://example.com/swiftfreight-logo.png"
  primary_color: "#EA580C"
  labels: { lead: "Shipper", leads: "Shippers", contact: "Contact", conversion: "Booked Shipment" }
agent:
  model: claude-haiku-4-5
  tone_examples:
    - "Hi {name}! Thanks for reaching out to {business_name}. Where are you shipping from and to?"
    - "I can get you a quote quickly — what's the cargo type and approximate weight?"
  goals: ["Capture origin/destination and cargo details", "Send a shipping quote", "Confirm pickup date"]
  compliance:
    - "Do not confirm final pricing via automated messages for hazardous/restricted cargo — escalate to a human dispatcher"
    - "DPDP: Require explicit opt-in before sending promotional shipping offers"
packs:
  - type: custom_fields
    payload:
      fields:
        - { key: shipment_type, label: "Shipment Type", type: DROPDOWN, options: ["FTL", "LTL", "Air Freight", "Sea Freight", "Express"], required: true }
        - { key: origin, label: "Origin", type: TEXT, required: true }
        - { key: destination, label: "Destination", type: TEXT, required: true }
        - { key: cargo_weight, label: "Cargo Weight (kg)", type: NUMBER }
        - { key: pickup_date, label: "Preferred Pickup Date", type: DATE }
        - { key: cargo_type, label: "Cargo Type", type: DROPDOWN, options: ["General", "Perishable", "Fragile", "Hazardous", "Oversized"] }
  - type: pipeline_stages
    payload:
      stages:
        - { name: "New Inquiry", status: NEW, order: 0, color: "#EA580C", isDefault: true }
        - { name: "Quote Requested", status: CONTACTED, order: 1, color: "#F59E0B" }
        - { name: "Quote Sent", status: PROPOSAL_SENT, order: 2, color: "#3B82F6" }
        - { name: "Booking Confirmed", status: APPOINTMENT_BOOKED, order: 3, color: "#06B6D4" }
        - { name: "In Transit", status: ENGAGED, order: 4, color: "#8B5CF6" }
        - { name: "Delivered", status: CONVERTED, order: 5, color: "#10B981", isEnd: true }
        - { name: "Cancelled", status: LOST, order: 6, color: "#EF4444", isEnd: true }
  - type: scoring_rules
    payload:
      rules:
        - { field: cargo_weight, operator: gte, value: "1000", points: 25, name: "Heavy Cargo" }
        - { field: pickup_date, operator: exists, value: "", points: 25, name: "Has Pickup Date" }
        - { field: shipment_type, operator: equals, value: "FTL", points: 20, name: "Full Truckload" }
        - { field: origin, operator: exists, value: "", points: 10, name: "Route Specified" }
  - type: routing_rules
    payload:
      rules:
        - name: "Heavy Cargo to Senior Dispatcher"
          conditions: [{ field: score, operator: gte, value: "50" }]
          action: { type: assign_to_agent, agent_role: MANAGER }
  - type: message_templates
    payload:
      templates:
        - name: welcome_logistics_inquiry
          type: WELCOME
          channel: WHATSAPP
          body: "Hi {{name}}! 🚚 Thanks for reaching out to {{business_name}}. Where are you shipping from and to, and what's the cargo type?"
          active: true
        - name: quote_followup
          type: FOLLOW_UP
          channel: WHATSAPP
          body: "Hi {{name}}, here's your quote for the {{shipment_type}} shipment from {{origin}} to {{destination}}. Let me know if you'd like to confirm the booking."
          active: true
