schema_version: 1
core_engine_version: "1.4.2"
niche:
  key: hospitality-demo
  industry: hospitality
  display_name: "StayWell Hotels"
branding:
  primary_color: "#0E7C7B"
  labels: { lead: "Guest", leads: "Guests", contact: "Contact", conversion: "Booking" }
agent:
  model: claude-haiku-4-5
  tone_examples:
    - "Hi {name}! Thanks for your interest in staying with us. Which dates are you looking at?"
    - "We'd love to host you! Want me to check availability for your dates?"
  goals: ["Confirm check-in/check-out dates", "Send room availability + rates", "Secure a booking"]
  compliance:
    - "Include cancellation/refund policy in all booking confirmations"
    - "DPDP: Require explicit opt-in before sending promotional offers"
packs:
  - type: custom_fields
    payload:
      fields:
        - { key: room_type, label: "Room Type", type: DROPDOWN, options: ["Standard", "Deluxe", "Suite", "Villa"], required: true }
        - { key: check_in_date, label: "Check-in Date", type: DATE, required: true }
        - { key: check_out_date, label: "Check-out Date", type: DATE, required: true }
        - { key: guest_count, label: "Number of Guests", type: NUMBER, required: true }
        - { key: booking_source, label: "Booking Source", type: DROPDOWN, options: ["Direct", "OTA", "Walk-in", "Corporate"] }
        - { key: special_requests, label: "Special Requests", type: TEXT }
  - type: pipeline_stages
    payload:
      stages:
        - { name: "New Inquiry", status: NEW, order: 0, color: "#0E7C7B", isDefault: true }
        - { name: "Availability Checked", status: CONTACTED, order: 1, color: "#F59E0B" }
        - { name: "Quote Sent", status: PROPOSAL_SENT, order: 2, color: "#3B82F6" }
        - { name: "Booking Confirmed", status: APPOINTMENT_BOOKED, order: 3, color: "#06B6D4" }
        - { name: "Checked In", status: ENGAGED, order: 4, color: "#8B5CF6" }
        - { name: "Checked Out", status: CONVERTED, order: 5, color: "#10B981", isEnd: true }
        - { name: "Cancelled", status: LOST, order: 6, color: "#EF4444", isEnd: true }
  - type: scoring_rules
    payload:
      rules:
        - { field: check_in_date, operator: exists, value: "", points: 30, name: "Has Dates" }
        - { field: room_type, operator: equals, value: "Suite", points: 20, name: "Premium Room" }
        - { field: guest_count, operator: gte, value: "4", points: 15, name: "Group Booking" }
        - { field: booking_source, operator: equals, value: "Direct", points: 10, name: "Direct Booking" }
  - type: message_templates
    payload:
      templates:
        - name: welcome_booking_inquiry
          type: WELCOME
          channel: WHATSAPP
          body: "Hi {{name}}! 🏨 Thanks for reaching out to {{business_name}}! Let us know your check-in and check-out dates and we'll check availability for you right away."
          active: true
        - name: booking_confirmation
          type: FOLLOW_UP
          channel: WHATSAPP
          body: "Hi {{name}}, your booking is confirmed for {{check_in_date}} to {{check_out_date}}. We look forward to hosting you!"
          active: true
